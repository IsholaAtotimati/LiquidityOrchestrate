<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liquidity Protocol</title>

  <link rel="stylesheet" href="style.css"/>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
</head>

<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="brand">
      <div class="logo"></div>
      <span>Liquidity orchestrate</span>
    </div>

    <div class="topbar-right">
      <div class="badge-live">LIVE SIMULATION</div>
      <button id="walletBtn" onclick="connectWallet()">Connect Wallet</button>
    </div>
  </header>

  <!-- MAIN GRID -->
  <main class="container">

    <!-- CARDS ROW -->
    <section class="grid">

      <div class="card">
        <h3>LP Position</h3>

        <div class="row">
          <span>Liquidity</span>
          <strong>1000 USDC / 1000 ETH</strong>
        </div>

        <div class="row">
          <span>Range</span>
          <strong>-120 → +120</strong>
        </div>

        <div class="status" id="lpStatus">ACTIVE</div>
      </div>

      <div class="card">
        <h3>Market State</h3>

        <div class="metric">
          <span>Tick</span>
          <strong id="tick">50</strong>
        </div>

        <div class="metric">
          <span>Price</span>
          <strong>$2,431</strong>
        </div>

        <div class="pill">Normal Volatility</div>
      </div>

      <div class="card">
        <h3>Yield Engine</h3>

        <div class="metric">
          <span>Strategy</span>
          <strong>Aave</strong>
        </div>

        <div class="metric">
          <span>Yield</span>
          <strong id="yield">0.00 USDC</strong>
        </div>

        <div class="pill green">Earning</div>
      </div>

    </section>

    <!-- EVENT STREAM -->
    <section class="events">
      <div class="events-header">
        <h3>Live Protocol Events</h3>
        <button id="streamToggle" class="stream-toggle" type="button" onclick="toggleEventStream()">Start live feed</button>
      </div>

      <div id="feed" class="feed"></div>
    </section>

    <!-- ACTIONS -->
    <section class="actions">
      <button onclick="addLiquidity()">Add Liquidity</button>
      <button onclick="simulateSwap()">Simulate Swap</button>
      <button class="danger" onclick="rebalance()">Rebalance</button>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
